<section class="checkout body-container">
  <div class="checkout-container">
    <h1>Checkout</h1>
    <div class="checkout-grid">
      <div class="checkout-left">
        <div class="faster-checkout">
          <p>
            Already have an account?
            <a href="login.html">for faster checkout</a>
          </p>
        </div>

        <form id="checkout-form">
          <div class="checkout-section">
            <h2>1. Contact information</h2>

            <div class="form-group">
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Your Name"
                required
              />
            </div>

            <div class="form-group">
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Your Email"
                required
              />
            </div>

            <div class="form-group">
              <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="Phone Number"
                required
              />
            </div>
          </div>

          <div class="checkout-section">
            <h2>2. Shipping details</h2>

            <div class="form-group">
              <input
                type="text"
                id="address"
                name="address"
                placeholder="Street Address"
                required
              />
            </div>

            <div class="form-row">
              <div class="form-group">
                <input
                  type="text"
                  id="city"
                  name="city"
                  placeholder="City"
                  required
                />
              </div>

              <div class="form-group">
                <input
                  type="text"
                  id="postal"
                  name="postal"
                  placeholder="Postal Code"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <select id="country" name="country" required>
                <option value="">Select Country</option>
                <option value="sweden">Sweden</option>
                <option value="norway">Norway</option>
                <option value="denmark">Denmark</option>
                <option value="finland">Finland</option>
              </select>
            </div>

            <div class="form-group">
              <select id="shipping-method" name="shipping-method" required>
                <option value="">Select Shipping Method</option>
                <option value="standard">Standard (3-5 days) - Free</option>
                <option value="express">Express (1-2 days) - 10 SEK</option>
                <option value="overnight">Overnight - 25 SEK</option>
              </select>
            </div>
          </div>

          <div class="checkout-section">
            <h2>3. Payment</h2>

            <div class="form-group">
              <input
                type="text"
                id="card-number"
                name="card-number"
                placeholder="Card Number"
                maxlength="19"
                required
              />
            </div>

            <div class="form-row">
              <div class="form-group">
                <input
                  type="number"
                  id="expiry"
                  name="expiry"
                  placeholder="MM/YY"
                  maxlength="5"
                  required
                />
              </div>

              <div class="form-group">
                <input
                  type="number"
                  id="cvv"
                  name="cvv"
                  placeholder="CVV"
                  maxlength="3"
                  required
                />
              </div>
            </div>
          </div>

          <button type="submit" class="checkout-button">
            Complete Purchase
          </button>
        </form>
      </div>

      <div class="checkout-right">
        <div class="cart-summary">
          <div id="cart-items" class="cart-items"></div>

          <div id="price-breakdown" class="price-breakdown"></div>
        </div>
      </div>
    </div>
  </div>
</section>
